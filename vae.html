<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Margi Pandya - Portfolio</title>
  <link rel="stylesheet" href="https://bowenc0221.github.io/assets/css/main.css">
  <style>
    .container {
      display: flex;
      align-items: flex-start;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
      gap: 2rem;
    }
    .sidebar {
      flex: 0 0 280px;
      min-width: 220px;
      max-width: 320px;
      position: sticky;
      top: 2rem;
      height: fit-content;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      z-index: 10;
    }
    .content {
      flex: 1 1 0;
      min-width: 0;
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      z-index: 1;
    }
    @media (max-width: 800px) {
      .container {
        flex-direction: column;
        gap: 1rem;
      }
      .sidebar, .content {
        max-width: 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation Bar -->
  <div class="masthead">
    <!-- ... navigation ... -->
  </div>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar sticky">
      <!-- ... sidebar content ... -->
    </aside>

    <!-- Main Content -->
    <main class="content">
      <!-- ... your VAE content ... -->
      <!-- Place all your <h2>, <p>, <ol>, <div class="math">, etc. here -->
    </main>
  </div>

  <div class="page__footer">
    <footer>
      <p>@2025 Margi Pandya</p>
    </footer>
  </div>
</body>
</html>
